
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>드레스덴(Dresden) | 가족 힐링 스테이</title>
    <style>
        /* 드레스덴 컨셉 컬러: 따뜻한 베이지 & 숲의 녹색 */
        :root { 
            --primary-green: #3e563f; 
            --warm-beige: #f5f2ed;
            --accent-gold: #c5a059;
            --text-main: #2d2d2d; 
        }
        
        body { font-family: 'Pretendard', -apple-system, sans-serif; margin: 0; line-height: 1.7; color: var(--text-main); background-color: #fff; }
        
        /* 상단 바 */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 25px 8%; background: white; border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary-green); letter-spacing: 2px; }
        nav a { margin-left: 25px; text-decoration: none; color: #666; font-size: 1rem; transition: 0.3s; }
        nav a:hover { color: var(--accent-gold); }

        /* 메인 배너 - '드레스덴'의 감성 */
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('main.jpg'); 
            height: 70vh; background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center;
        }
        .hero h1 { font-size: 3.5rem; margin-bottom: 5px; font-weight: 300; }
        .hero p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 30px; }

        /* 네이버 예약 버튼 */
        .btn-naver { 
            background-color: #03c75a; color: white; padding: 16px 45px; border-radius: 2px; 
            text-decoration: none; font-weight: bold; transition: 0.4s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-naver:hover { background-color: #02b350; transform: translateY(-3px); }

        /* 섹션 공통 스타일 */
        .section { padding: 100px 10%; text-align: center; }
        .section h2 { font-size: 2.2rem; margin-bottom: 15px; color: var(--primary-green); }
        .underline { width: 50px; height: 2px; background: var(--accent-gold); margin: 0 auto 40px; }

        /* 객실 카드 */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; }
        .room-card { transition: 0.3s; cursor: pointer; text-align: left; }
        .room-card:hover { transform: translateY(-10px); }
        .room-img { width: 100%; height: 250px; object-fit: cover; border-radius: 5px; }
        .room-info h3 { margin: 15px 0 5px; font-size: 1.4rem; }
        .room-info p { color: #888; font-size: 0.95rem; }

        footer { background: var(--warm-beige); padding: 60px 10%; border-top: 1px solid #e0ddd7; color: #777; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">DRESDEN</div>
    </header>

    <section class="hero">
        <p>Classic & Family Stay</p>
        <h1>드레스덴 펜션</h1>
        <p>우리 가족이 머무는 예술 같은 휴식처</p>
        <a href="https://naver.me/IgM2Kegq/" target="_blank" class="btn-naver">네이버 실시간 예약하기</a>
    </section>

    <section class="section" id="rooms">
        <h2>Our Rooms</h2>
        <div class="underline"></div>
        <div class="grid">
            <div class="room-card">
                <img src="room1.jpg" class="room-img">
                <div class="room-info">
                    <h3>젬퍼</h3>
                    <p>거실 · 개별 테라스 (기준 2인/최대 4인)</p>
                </div>
            </div>
            <div class="room-card">
                <img src="room2.jpg" class="room-img">
                <div class="room-info">
                    <h3>엘베</h3>
                    <p>거실 · 개별 테라스 (기준 4인/최대 5인)</p>
                </div>
            </div>
        </div>
    </section>
    <footer>
        <div style="margin-bottom: 20px;">
            <strong>남해 독일마을 드레스덴 펜션</strong><br>
            주소: 경남 남해군 삼동면 독일로 61-24 | 예약문의: 010-2135-1151 | 사업자번호: 712-17-02545
        </div>
        <p>© 2026 DRESDEN Pension</p>
    </footer>

</body>
</html>
